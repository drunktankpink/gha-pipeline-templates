name: Terraform Destroy

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
        description: "Directory containing Terraform files"
      terraform-version:
        required: false
        type: string
        default: 'latest' # 1.12.2
        description: "Terraform version to use"
      aws-region:
        required: false
        type: string
        default: 'eu-west-2'
        description: "AWS region for deployment"
      role-to-assume:
        required: false
        type: string
        description: "AWS IAM role ARN to assume for authentication"
      destroy-args:
        required: false
        type: string
        default: ''
        description: "Additional arguments for terraform destroy"
      confirmation-input:
        required: true
        type: string
        description: "Required confirmation string to proceed with destroy (must match 'destroy-confirmed')"
      target-resources:
        required: false
        type: string
        default: ''
        description: "Specific resources to destroy (comma-separated, optional)"
      environment:
        required: false
        type: string
        default: 'production'
        description: "GitHub environment for deployment protection (highly recommended for destroy)"

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirmation-input }}" != "destroy-confirmed" ]; then
            echo "❌ Confirmation failed. Expected 'destroy-confirmed', got '${{ inputs.confirmation-input }}'"
            echo "This is a safety measure to prevent accidental destruction."
            exit 1
          fi
          echo "✅ Confirmation validated. Proceeding with destroy operation."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: inputs.role-to-assume != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init

      - name: Terraform Plan Destroy
        id: plan-destroy
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "### Planning Destroy Operation" >> $GITHUB_STEP_SUMMARY
          echo "**Directory:** \`${{ inputs.working-directory }}\`" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ inputs.target-resources }}" ]; then
            # Convert comma-separated list to multiple -target flags
            targets=""
            IFS=',' read -ra ADDR <<< "${{ inputs.target-resources }}"
            for resource in "${ADDR[@]}"; do
              targets="$targets -target=$(echo $resource | xargs)"
            done
            echo "**Target Resources:** \`${{ inputs.target-resources }}\`" >> $GITHUB_STEP_SUMMARY
            terraform plan -destroy $targets ${{ inputs.destroy-args }}
          else
            echo "**Scope:** All resources" >> $GITHUB_STEP_SUMMARY
            terraform plan -destroy ${{ inputs.destroy-args }}
          fi

      - name: Terraform Destroy
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -n "${{ inputs.target-resources }}" ]; then
            # Convert comma-separated list to multiple -target flags
            targets=""
            IFS=',' read -ra ADDR <<< "${{ inputs.target-resources }}"
            for resource in "${ADDR[@]}"; do
              targets="$targets -target=$(echo $resource | xargs)"
            done
            terraform destroy -auto-approve $targets ${{ inputs.destroy-args }}
          else
            terraform destroy -auto-approve ${{ inputs.destroy-args }}
          fi

      - name: Create Destroy Summary
        if: always()
        run: |
          echo "### Terraform Destroy Results" >> $GITHUB_STEP_SUMMARY
          echo "**Directory:** \`${{ inputs.working-directory }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Confirmation:** \`${{ inputs.confirmation-input }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Destroy operation completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "🗑️ Resources have been destroyed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Destroy operation failed" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some resources may still exist - manual cleanup may be required" >> $GITHUB_STEP_SUMMARY
          fi