name: Terraform Plan

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
        description: "Directory containing Terraform files"
      terraform-version:
        required: false
        type: string
        default: 'latest' # 1.12.2
        description: "Terraform version to use"
      aws-region:
        required: false
        type: string
        default: 'eu-west-2'
        description: "AWS region for deployment"
      role-to-assume:
        required: false
        type: string
        description: "AWS IAM role ARN to assume for authentication"
      plan-args:
        required: false
        type: string
        default: ''
        description: "Additional arguments for terraform plan"
      comment-pr:
        required: false
        type: boolean
        default: true
        description: "Whether to comment plan output on PR"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: inputs.role-to-assume != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -no-color ${{ inputs.plan-args }}
        continue-on-error: true

      - name: Create Plan Status
        id: status
        run: |
          if [ "${{ steps.plan.outcome }}" == "success" ]; then
            echo "status=✅ Plan Successful" >> $GITHUB_OUTPUT
            echo "summary=✅ Plan completed successfully" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Plan Failed" >> $GITHUB_OUTPUT
            echo "summary=❌ Plan failed" >> $GITHUB_OUTPUT
          fi

      - name: Create Plan Summary
        if: always()
        run: |
          echo "### Terraform Plan Results" >> $GITHUB_STEP_SUMMARY
          echo "**Directory:** \`${{ inputs.working-directory }}\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.status.outputs.summary }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with Plan Output
        if: github.event_name == 'pull_request' && inputs.comment-pr
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan: \`${{ inputs.working-directory }}\` ${{ steps.status.outputs.status }}

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Working Directory: \`${{ inputs.working-directory }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });