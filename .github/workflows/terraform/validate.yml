name: Terraform Validate

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Init & Validate
        run: |
          terraform -chdir=${{ inputs['working-directory'] }} init -backend=false
          terraform -chdir=${{ inputs['working-directory'] }} validate